name: Deploy Lambda
on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Environment'
        required: true
        options:
          - intg
          - staging
          - prod
        default: 'intg'
      toDeploy:
        description: 'Version to deploy'
        required: true

run-name: Deploying Keycloak-user-management Lambda ${{inputs.toDeploy}} to ${{inputs.environment}}
permissions:
  id-token: write
  contents: write
  actions: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.WORKFLOW_PAT }}
      - name: Configure AWS credentials from management account
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_NUMBER }}:role/TDRGithubActionsDeployLambda${{ secrets.TITLE_STAGE }}
          aws-region: eu-west-2
          role-session-name: DeployLambda
      - name: Deploy lambda
        env:
          DEPLOY_VERSION: ${{ github.event.inputs.toDeploy }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          aws lambda update-function-code --function-name "tdr-create-keycloak-user-s3-${ENVIRONMENT}" --s3-bucket tdr-backend-code-mgmt --s3-key "keycloak-user-management/${DEPLOY_VERSION}/keycloak-user-management.jar" > /dev/null
          aws lambda update-function-code --function-name "tdr-create-keycloak-user-api-${ENVIRONMENT}" --s3-bucket tdr-backend-code-mgmt --s3-key "keycloak-user-management/${DEPLOY_VERSION}/keycloak-user-management.jar" > /dev/null
          aws lambda update-function-code --function-name "tdr-inactive-keycloak-users-${ENVIRONMENT}" --s3-bucket tdr-backend-code-mgmt --s3-key "keycloak-user-management/${DEPLOY_VERSION}/keycloak-user-management.jar" > /dev/null
      - name: Send service updated message
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          payload: |
            {
              "service" : "Keycloak user management",
              "version" : "${{ github.event.inputs.toDeploy }}",
              "environment": "${{ github.event.inputs.environment }}"
            }
          webhook-type: "incoming-webhook"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_SUCCESS_WORKFLOW }}
      - name: Update release branch
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          git branch -f "release-${ENVIRONMENT}" HEAD
          git push -f origin "release-${ENVIRONMENT}"
      - name: Run E2E tests
        if: github.event.inputs.environment != 'prod'
        uses: octokit/request-action@b91aabaa861c777dcdb14e2387e30eddf04619ae # v3.0.0
        with:
          route: POST /repos/nationalarchives/tdr-e2e-tests/actions/workflows/ci.yml/dispatches
          ref: master
          inputs: "{\"environment\": \"${{ github.event.inputs.environment }}\", \"repo-details\": \"tdr-keycloak-user-management@${{ inputs.toDeploy }}\"}"
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_PAT }}
      - name: Send failure message
        id: slack
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        if: ${{ failure() }}
        with:
          payload: |
            {
              "service" : "Keycloak user management",
              "version" : "${{ github.event.inputs.toDeploy }}",
              "environment": "${{ github.event.inputs.environment }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_FAILURE_WORKFLOW }}
